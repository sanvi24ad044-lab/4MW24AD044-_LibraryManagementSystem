<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>📚 Library Management System</h1>
    </header>

    <div class="container">
        <section class="form-section">
            <h2>Book Management</h2>
            <div class="input-group">
                <input type="text" id="bookid" placeholder="Book ID">
                <input type="text" id="title" placeholder="Book Title">
                <input type="text" id="author" placeholder="Author Name">
                <input type="number" id="price" placeholder="Price ($)">
            </div>

            <div class="button-group">
                <button onclick="insertBook()" class="btn btn-insert">Insert Book</button>
                <button onclick="updateBook()" class="btn btn-update">Update Book</button>
                <button onclick="deleteBook()" class="btn btn-delete">Delete Book</button>
                <button onclick="displayBooks()" class="btn btn-display">Display Records</button>
            </div>
        </section>

        <hr class="divider">

        <section class="operations-section">
            <h2>Database Operations</h2>
            <div class="button-group central-buttons">
                <button onclick="executeProcedure()" class="btn btn-op">Execute Stored Procedure</button>
                <button onclick="triggerDemo()" class="btn btn-op">Trigger Demonstration</button>
            </div>
        </section>

        <hr class="divider">

        <section class="output-section">
            <h2>Output Console</h2>
            <div id="output" class="output-box">
                <p class="placeholder-text">Results will be displayed here...</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
